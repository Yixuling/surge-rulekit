# ========================================
# Surge 配置（脱敏示例模板）
# ========================================
#
# 本文件由作者实际使用的配置脱敏而来，可作为「三层多机场聚合架构」的参考模板。
# 直接下载：
#   https://raw.githubusercontent.com/Yixuling/surge-rulekit/main/Surge.example.conf
#
# ── 套用前必改的 4 处占位 ──
#   1. [General] http-api          your-password → 你的本地 API 密码
#   2. [Proxy Group] AllProxies    policy-path   → 你的机场订阅链接
#   3. [Proxy Group] 主力/备用机场  policy-regex-filter → 占位「机场A标识 / 机场B标识」换成你的节点名关键词
#   4. [MITM]                       自行在 Surge 内生成并安装 CA 证书（切勿写入公开配置）
#
# ── 三层路由架构 ──
#   L1 从订阅源按地区过滤原始节点池
#   L2 在各节点池上独立运行 Smart 引擎
#   L3 通过 fallback 将多机场聚合为统一出口
#
# 本模板假设单一聚合订阅内含多个机场的节点，节点名带可区分的机场标识，用正则切分为
# 「主力机场 / 备用机场」。若你只有一个机场，删除备用机场相关组即可；若是多个独立订阅，
# 改为多个 policy-path 各自引入。
#
# ── 按需裁剪 ──
#   - 机场缺某地区节点（如无台湾）：删除该地区的 L1/L2/L3 各一行，及 📍 Regions 中对应引用。
#   - L2 的 smart 策略组：iOS 端为订阅解锁功能；Mac 端随 Surge Mac 5 许可附带、无需额外付费
#    （Surge 本身仍是付费软件）。不可用时把 smart 全局替换为 url-test 即可，整体架构不变。
#
# 📚 参考文档：
#   - 官方手册：https://manual.nssurge.com/
#   - 理解原理：https://manual.nssurge.com/book/understanding-surge/cn/
#   - 帮助中心：https://nssurge.zendesk.com/
#   - 技术社区：https://community.nssurge.com
#
# ========================================

[General]
# 日志级别（verbose 影响性能）
loglevel = notify

# 连接状态检测 URL
internet-test-url = http://www.qualcomm.cn/generate_204
# 节点测速 URL
proxy-test-url = http://cp.cloudflare.com/generate_204
# 测速超时（秒）
test-timeout = 5

# 关闭 IPv6（国内支持不稳定）
ipv6 = false
ipv6-vif = off

# REJECT 返回错误页便于排查
show-error-page-for-reject = true

# ── DNS ──
# 上游 DNS（兼作 DoH 的 bootstrap 与兜底）
dns-server = 119.29.29.29, 223.5.5.5
# 加密 DNS（DoH）：阿里为主、腾讯 doh.pub 为备；仅作用于本地解析腿（防劫持），翻墙流量在出口远程解析、不经此处，故不影响防审查
encrypted-dns-server = https://223.5.5.5/dns-query, https://doh.pub/dns-query
# 读取系统 hosts
read-etc-hosts = true
# 代理请求不用 [Host] 静态映射（代理端自行解析）
use-local-host-item-for-proxy = false
# 加密 DNS 不跟随出站策略，走本地解析
encrypted-dns-follow-outbound-mode = false
# 劫持所有 53 端口明文 DNS 查询，防应用硬编码 DNS 绕过 Surge
hijack-dns = *:53
# 跳过无点主机名（如 localhost）
exclude-simple-hostnames = true
# 直连绕过：私有/保留网段、本地域名、系统检测域名，以及反代理检测的应用（如银行）
skip-proxy = localhost, *.local, *.localdomain, captive.apple.com, sequoia.apple.com, seed-sequoia.siri.apple.com, *.home.arpa, injections.adguard.org, local.adguard.org, abchina.com, *.abchina.com, abchina.com.cn, *.abchina.com.cn, 0.0.0.0/8, 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.168.0.0/16, 198.18.0.0/15, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
# UDP 无法转发时拒绝，防 IP 泄露（WebRTC）
udp-policy-not-supported-behaviour = reject
# 以下域名跳过 fake-ip 返回真实 IP（Apple/NTP/STUN 依赖真实 IP）
always-real-ip = *.lan, *.home.arpa, router.asus.com, *.msftconnecttest.com, *.msftncsi.com, *.apple.com, *.cdn-apple.com, *.icloud.com, *.apple-cloudkit.com, *.apple-livephotoskit.com, *.push-apple.com.akadns.net, *.push.apple.com, captive.apple.com, *.ntp.org, time.*.com, time.*.apple.com, time1.cloud.tencent.com, time.*.aliyun.com, ntp.*.com, *.time.edu.cn, *.ntp.org.cn, time.windows.com, stun.*.*, *.icloud.com.cn

# ── 网络优化 ──
# 弱 Wi-Fi 自动切蜂窝
wifi-assist = true
# Wi-Fi+蜂窝 混合（关以省流量）
all-hybrid = false
# UDP 优先级（游戏优化）
udp-priority = false
# 阻断 QUIC：仅代理策略（直连 HTTP/3 放行），代替手写 UDP/443 规则；防 UDP 绕代理泄漏由 udp-policy-not-supported-behaviour=reject 兜底
block-quic = per-policy

# ── 监听 ──
# HTTP 代理端口
http-listen = 127.0.0.1:6152
# SOCKS5 端口
socks5-listen = 127.0.0.1:6153
# 禁止局域网设备接入
allow-wifi-access = false
allow-hotspot-access = false
# HTTP API（Dashboard/外部调用，仅本地）；your-password 改成你自己的密码
http-api = your-password@127.0.0.1:6154
http-api-tls = false
http-api-web-dashboard = true

# ── GeoIP ──
# GeoIP 库（Loyalsoldier）
geoip-maxmind-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
# 已用 ASN 分流，关闭 GeoIP 自动更新
disable-geoip-db-auto-update = true

[Proxy]
🎯 Direct = direct
⛔️ Reject = reject

[Proxy Group]
# ── 核心出口 ──
# 主代理入口（自动选路，可手动切换）
🚀 Proxy = select, "🌀 💫 Auto", "🎯 Direct", include-other-group = "📍 Regions, AllProxies"
# 全局兜底（dns-failed 也走此组）
🟢 Final = select, "🚀 Proxy", "⛔️ Reject", "🎯 Direct", include-other-group = "📍 Regions, AllProxies"
# 广告/隐私策略（规则集已停用，AdGuard 接管）
🔰 Guard = select, "⛔️ Reject", "🚀 Proxy", "🎯 Direct"

# ── 服务分流 ──
# 各服务独立选择：代理 / 专线 / 直连 / 地区
Apple     = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Apple.png?v=3
AI        = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/AI.png?v=3
Arc & Dia = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/ArcDia.png?v=3
DeepL     = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/DeepL.png?v=3
Disney    = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Disney.png?v=3
GitHub    = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/GitHub.png?v=3
Google    = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Google.png?v=3
JetBrains = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/JetBrains.png?v=3
Netflix   = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Netflix.png?v=3
PayPal    = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/PayPal.png?v=3
Twitter   = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Twitter.png?v=3
Telegram  = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Telegram.png?v=3
Speedtest = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/Speedtest.png?v=3
WeChat    = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/WeChat.png?v=3
YouTube   = select, "🚀 Proxy", "🚄 Static", "🎯 Direct", include-other-group = "📍 Regions, AllProxies", icon-url = https://raw.githubusercontent.com/Yixuling/surge-rulekit/refs/heads/main/icons/YouTube.png?v=3

# 命名规则（均为 hidden，仅配置文件内可见）：
#   L1  短代码   🇭🇰 HK | 主力机场          原始节点池（select · 按地区正则筛选）
#   L2  全名     🇭🇰 HongKong | 主力机场    Smart 引擎（smart · 智能选路）
#   L3  🌀 前缀  🌀 🇭🇰 HongKong             可见路由（fallback · 主优先冷备）

# ── L1 节点池 ──
# 按地区正则筛选原始节点，供 L2 使用
# 注意：正则中的裸缩写（US/TW/HK 等）可能误命中含相同子串的节点名（如 AUS 含 US），按自家节点命名酌情收紧
# 地区旗帜以 🇼🇸 代替 🇹🇼 是刻意的：国行 Apple 设备不渲染台湾旗，改回会显示异常
# 主力机场（把专线节点排除在普通地区池外，单列入 🚄 Static 组）
# SPECIAL 为占位关键词，替换成你机场专线 / 独享 IP 节点名的标识
# 无专线套餐：删掉各正则中的 ^(?!.*SPECIAL) 前缀、下方 🚄 Static 组，并同步删除各服务组行内的
# "🚄 Static", 引用（共 15 处，查找替换即可）——只删组不删引用会导致配置加载报错
🇭🇰 HK | 主力机场 = select, hidden = 1, include-other-group = 主力机场, policy-regex-filter = ^(?!.*SPECIAL).*(HongKong|香港|HK|🇭🇰)
🇸🇬 SG | 主力机场 = select, hidden = 1, include-other-group = 主力机场, policy-regex-filter = ^(?!.*SPECIAL).*(Singapore|新加坡|SG|🇸🇬)
🇺🇸 US | 主力机场 = select, hidden = 1, include-other-group = 主力机场, policy-regex-filter = ^(?!.*SPECIAL).*(United States|美国|US|USA|🇺🇸)
🇯🇵 JP | 主力机场 = select, hidden = 1, include-other-group = 主力机场, policy-regex-filter = ^(?!.*SPECIAL).*(Japan|日本|JP|🇯🇵)
🇼🇸 TW | 主力机场 = select, hidden = 1, include-other-group = 主力机场, policy-regex-filter = ^(?!.*SPECIAL).*(Taiwan|台湾|TW|🇹🇼|🇼🇸)
# 备用机场
🇭🇰 HK | 备用机场 = select, hidden = 1, include-other-group = 备用机场, policy-regex-filter = HongKong|香港|HK|🇭🇰
🇸🇬 SG | 备用机场 = select, hidden = 1, include-other-group = 备用机场, policy-regex-filter = Singapore|新加坡|SG|🇸🇬
🇺🇸 US | 备用机场 = select, hidden = 1, include-other-group = 备用机场, policy-regex-filter = United States|美国|US|USA|🇺🇸
🇯🇵 JP | 备用机场 = select, hidden = 1, include-other-group = 备用机场, policy-regex-filter = Japan|日本|JP|🇯🇵
🇼🇸 TW | 备用机场 = select, hidden = 1, include-other-group = 备用机场, policy-regex-filter = Taiwan|台湾|TW|🇹🇼|🇼🇸

# ── L2 Smart 引擎 ──
# 在 L1 池上运行 Smart，按历史延迟/成功率选路
# 💫 Auto 刻意只纳入低延迟地区（HK/SG）作自动选路，按需增删地区池
# 主力机场
💫 Auto | 主力机场       = smart, hidden = 1, include-other-group = "🇭🇰 HK | 主力机场, 🇸🇬 SG | 主力机场"
🇭🇰 HongKong | 主力机场   = smart, hidden = 1, include-other-group = "🇭🇰 HK | 主力机场"
🇸🇬 Singapore | 主力机场  = smart, hidden = 1, include-other-group = "🇸🇬 SG | 主力机场"
🇺🇸 USA | 主力机场        = smart, hidden = 1, include-other-group = "🇺🇸 US | 主力机场"
🇯🇵 Japan | 主力机场      = smart, hidden = 1, include-other-group = "🇯🇵 JP | 主力机场"
🇼🇸 Taiwan | 主力机场     = smart, hidden = 1, include-other-group = "🇼🇸 TW | 主力机场"
# 备用机场
💫 Auto | 备用机场       = smart, hidden = 1, include-other-group = "🇭🇰 HK | 备用机场, 🇸🇬 SG | 备用机场"
🇭🇰 HongKong | 备用机场   = smart, hidden = 1, include-other-group = "🇭🇰 HK | 备用机场"
🇸🇬 Singapore | 备用机场  = smart, hidden = 1, include-other-group = "🇸🇬 SG | 备用机场"
🇺🇸 USA | 备用机场        = smart, hidden = 1, include-other-group = "🇺🇸 US | 备用机场"
🇯🇵 Japan | 备用机场      = smart, hidden = 1, include-other-group = "🇯🇵 JP | 备用机场"
🇼🇸 Taiwan | 备用机场     = smart, hidden = 1, include-other-group = "🇼🇸 TW | 备用机场"

# ── L3 可见路由 ──
# 对外地区出口；fallback 主机场优先、备用冷备，故障自动切换/回切
🌀 💫 Auto       = fallback, "💫 Auto | 主力机场",      "💫 Auto | 备用机场",      url = http://cp.cloudflare.com/generate_204, interval = 300
🌀 🇭🇰 HongKong   = fallback, "🇭🇰 HongKong | 主力机场",  "🇭🇰 HongKong | 备用机场",  url = http://cp.cloudflare.com/generate_204, interval = 300
🌀 🇸🇬 Singapore  = fallback, "🇸🇬 Singapore | 主力机场", "🇸🇬 Singapore | 备用机场", url = http://cp.cloudflare.com/generate_204, interval = 300
🌀 🇺🇸 USA        = fallback, "🇺🇸 USA | 主力机场",       "🇺🇸 USA | 备用机场",       url = http://cp.cloudflare.com/generate_204, interval = 300
🌀 🇯🇵 Japan      = fallback, "🇯🇵 Japan | 主力机场",     "🇯🇵 Japan | 备用机场",     url = http://cp.cloudflare.com/generate_204, interval = 300
🌀 🇼🇸 Taiwan     = fallback, "🇼🇸 Taiwan | 主力机场",    "🇼🇸 Taiwan | 备用机场",    url = http://cp.cloudflare.com/generate_204, interval = 300

# ── 专线 ──
# 专线组（独享 IP 等特殊节点），从主力机场节点中按占位标识 SPECIAL 筛出，独立于普通池
# 删除本组时，务必同步删除各服务组行内的 "🚄 Static", 引用（见 L1 节点池注释）
🚄 Static = select, include-other-group = 主力机场, policy-regex-filter = SPECIAL

# ── 订阅源 ──
# 接入方式二选一；无论哪种，上层 L1/L2/L3 与各服务组（均按 group 名引用）都无需改动。
#
# 【方式 A】单一聚合订阅（默认）：一个订阅链接内含多个机场的节点，AllProxies 引入后，
#   用 policy-regex-filter 按节点名标识切分为主力/备用机场。
#   ⚠️ 「机场A标识 / 机场B标识」为必改占位：换成你订阅里节点名中可区分机场的关键词
#   （如机场名或其缩写），否则正则筛不到任何节点，所有策略组都会是空的。
AllProxies = select, hidden = 1, policy-path = https://example.com/your-subscription-url, icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
主力机场 = select, include-other-group = AllProxies, policy-regex-filter = 机场A标识, icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
备用机场 = select, include-other-group = AllProxies, policy-regex-filter = 机场B标识, icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
#
# 【方式 B】各机场独立订阅：每个机场各自一个 policy-path，再用 AllProxies 聚合二者作兜底。
#   改用此方式时，注释掉上面方式 A 的三行，启用下面三行（L1/L2/L3 仍按 group 名引用，无需改动）。
# 主力机场 = select, hidden = 1, policy-path = https://example.com/provider-a-subscription-url, icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
# 备用机场 = select, hidden = 1, policy-path = https://example.com/provider-b-subscription-url, icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
# AllProxies = select, hidden = 1, include-other-group = "主力机场, 备用机场", icon-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png
#   若机场订阅里混入「官网/到期/剩余流量」等信息节点，可在各机场组加正则排除，例如：
#   policy-regex-filter = ^((?!官网|到期|剩余|流量|重置).)*$

# ── 工具 ──
# 地区快速切换（聚合 L3）
📍 Regions = select, hidden = 1, "🌀 🇭🇰 HongKong", "🌀 🇸🇬 Singapore", "🌀 🇺🇸 USA", "🌀 🇯🇵 Japan", "🌀 🇼🇸 Taiwan"

[Rule]
# 拦截 0.0.0.0 无效请求
IP-CIDR, 0.0.0.0/32, REJECT, no-resolve

# Apple 硬编码 17.0.0.0/8（APNs/FaceTime）；由规则接管确保引擎可见
IP-CIDR, 17.0.0.0/8, DIRECT, no-resolve

# 规则修正：如机场订阅域名/特定站点需强制直连，在此按需添加（示例已脱敏移除）
# DOMAIN, your-airport-api.example.com, DIRECT

# 广告/隐私/劫持：已由 AdGuard 内容层（HTTPS 过滤）接管，以下停用；如需启用取消注释即可
# RULE-SET, https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Advertising/Advertising.list, 🔰 Guard
# RULE-SET, https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Privacy/Privacy.list, 🔰 Guard
# RULE-SET, https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Hijacking/Hijacking.list, 🔰 Guard

# ── 微信 ──
